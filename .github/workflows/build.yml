name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo y | ./latest/bin/sdkmanager "platforms;android-30" "build-tools;30.0.3" > /dev/null
      - name: Install smali
        run: |
          # Télécharger smali depuis un miroir fonctionnel
          wget -q https://github.com/LSPosed/smali/releases/download/v2.5.2/smali-2.5.2.jar
          # Vérifier que le fichier est un JAR valide
          if ! grep -q "PK" smali-2.5.2.jar; then
            wget -q https://repo1.maven.org/maven2/org/smali/smali/2.5.2/smali-2.5.2.jar
          fi
      - name: Compile APK
        run: |
          # Compiler les smali en dex
          java -jar smali-2.5.2.jar assemble smali -o classes.dex
          # Créer l'APK avec zip (pas aapt)
          zip -r Lamvvo_Service.apk AndroidManifest.xml res/ classes.dex
          # Signer avec une clé de debug
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=DE" -storepass android -keypass android
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android Lamvvo_Service.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lamvvo_Service
          path: Lamvvo_Service.apk
