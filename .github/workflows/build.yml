name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo y | ./latest/bin/sdkmanager "platforms;android-30" "build-tools;30.0.3" > /dev/null
      - name: Compile APK
        run: |
          # Télécharger smali
          wget -q https://github.com/LSPosed/smali/releases/download/v2.5.2/smali-2.5.2.jar
          # Compiler les smali en dex
          java -jar smali-2.5.2.jar assemble smali -o classes.dex
          # Créer l'APK
          aapt package -f -M AndroidManifest.xml -S res -I $HOME/android-sdk/platforms/android-30/android.jar -F app.apk
          aapt add app.apk classes.dex
          # Signer avec une clé de debug
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app.apk
          mv app.apk Lamvvo_Service.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lamvvo_Service
          path: Lamvvo_Service.apk
