name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          echo y | ./latest/bin/sdkmanager "platforms;android-30" "build-tools;30.0.3" > /dev/null
          echo "$HOME/android-sdk/build-tools/30.0.3" >> $GITHUB_PATH
      - name: Compile APK with d8
        run: |
          # Utiliser d8 pour convertir les smali en dex (d8 accepte les .smali)
          d8 --lib $HOME/android-sdk/platforms/android-30/android.jar --output . smali/com/helper/*.smali
          # Créer l'APK
          aapt package -f -M AndroidManifest.xml -S res -I $HOME/android-sdk/platforms/android-30/android.jar -F app.apk
          # Ajouter le dex généré par d8 (classes.dex)
          aapt add app.apk classes.dex
          # Générer une clé de debug
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=DE" -storepass android -keypass android
          # Signer
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app.apk
          mv app.apk Lamvvo_Service.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lamvvo_Service
          path: Lamvvo_Service.apk
